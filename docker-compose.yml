version: '3.8'

services:
  backend:
    build: ./backend
    container_name: carbon-backend
    ports:
      - "8000:8000"
    volumes:
      - carbon-data:/app/data
      - carbon-uploads:/app/uploads
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-sk-xxx}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: carbon-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  carbon-data:
  carbon-uploads:

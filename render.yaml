services:
  - type: web
    name: ai-carbon-backend
    runtime: docker
    repo: https://github.com/xsaxyag/ai-carbon-system
    region: singapore
    plan: free
    branch: main
    rootDir: backend
    dockerContext: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_PATH
        value: /app/carbon.db
  - type: web
    name: ai-carbon-frontend
    runtime: static
    repo: https://github.com/xsaxyag/ai-carbon-system
    region: singapore
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
